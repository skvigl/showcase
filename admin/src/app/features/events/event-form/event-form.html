<app-form-page-toolbar
  [title]="event()?.name"
  [mode]="mode()"
  [form]="form"
  (back)="goToList()"
  (edit)="enableEdit()"
  (save)="save()"
  (cancel)="cancelEdit()"
/>

<form [formGroup]="form">
  <app-form>
    @if (mode() !== 'create') {
      <app-form-row [cols]="2">
        <mat-form-field appearance="outline">
          <mat-label>ID</mat-label>
          <input matInput formControlName="id" readonly />
        </mat-form-field>
      </app-form-row>
    }

    <app-form-row [cols]="2">
      <mat-form-field appearance="outline">
        <mat-label>Name</mat-label>
        <input matInput formControlName="name" [readonly]="mode() === 'view'" />
      </mat-form-field>
    </app-form-row>

    <app-form-row [cols]="4">
      <mat-form-field appearance="outline">
        <mat-label>Start date</mat-label>
        <input matInput [matDatepicker]="startDatePicker" formControlName="startDate" />
        <mat-datepicker-toggle matIconSuffix [for]="startDatePicker"></mat-datepicker-toggle>
        <mat-datepicker #startDatePicker></mat-datepicker>
      </mat-form-field>
      <mat-form-field [appearance]="'outline'">
        <mat-label>End date</mat-label>
        <input matInput [matDatepicker]="end_date" formControlName="endDate" />
        <mat-datepicker-toggle matIconSuffix [for]="end_date"></mat-datepicker-toggle>
        <mat-datepicker #end_date></mat-datepicker>
      </mat-form-field>
    </app-form-row>
  </app-form>
</form>
