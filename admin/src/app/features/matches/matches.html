<div class="header">
  <h1>Matches</h1>
  <form [formGroup]="filtersForm">
    <mat-form-field appearance="outline">
      <mat-label>Tournaments</mat-label>
      <mat-select formControlName="tournamentId">
        <mat-option value="">All tournaments</mat-option>
        @for (tr of tournaments(); track tr.id) {
          <mat-option [value]="tr.id">{{ tr.name }}</mat-option>
        }
      </mat-select>
    </mat-form-field>
  </form>
  <button class="header-create-btn" matButton="outlined" (click)="createMatch()">
    Create Match
  </button>
</div>
<app-datatable
  [data]="matches()"
  [columns]="matchColumns"
  [actions]="matchActions"
  (pageChange)="onPageChange($event)"
/>
